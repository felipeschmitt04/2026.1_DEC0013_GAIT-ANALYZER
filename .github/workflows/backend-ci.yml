name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.api.txt

      - name: Static compile check
        run: python -m compileall backend/app backend/storage/scripts engine_dgx

      - name: Run backend tests
        working-directory: backend
        env:
          ENGINE_MODE: mock
        run: python -m pytest tests
